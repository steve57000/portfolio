<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-labelledby="react-title">
  <title id="react-title">React</title>
  <style>
  .frame{fill:color-mix(in srgb,currentColor 7%,transparent);stroke:currentColor;stroke-width:1.45;opacity:.98}
  .main{fill:none;stroke:currentColor;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
  .accent{fill:none;stroke:var(--icon-accent,#d7b56d);stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
  .dot{fill:var(--icon-accent,#d7b56d)}
  .fill{fill:currentColor}
</style>
  <circle class="dot" cx="12" cy="12" r="1.8"/><ellipse class="main" cx="12" cy="12" rx="8.5" ry="3.2"/><ellipse class="main" cx="12" cy="12" rx="8.5" ry="3.2" transform="rotate(60 12 12)"/><ellipse class="main" cx="12" cy="12" rx="8.5" ry="3.2" transform="rotate(120 12 12)"/><circle class="frame" cx="12" cy="12" r="9"/>
</svg>
